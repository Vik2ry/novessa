services:
  - type: web
    name: novessa-api
    runtime: python
    rootDir: apps/api
    pythonVersion: 3.12
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && python manage.py create_admin && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --worker-class sync --worker-tmp-dir /dev/shm --log-file -"
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: novessa-api.onrender.com,api.novessafoundation.org.ng,localhost,127.0.0.1
      - key: CSRF_TRUSTED_ORIGINS
        value: https://novessa-api.onrender.com,https://novessafoundation.org.ng,https://www.novessafoundation.org.ng,https://api.novessafoundation.org.ng,https://novessa-web.vercel.app,https://www.novessa-web.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://novessa-api.onrender.com,https://novessafoundation.org.ng,https://www.novessafoundation.org.ng,https://api.novessafoundation.org.ng,https://novessa-web.vercel.app,https://www.novessa-web.vercel.app
      - key: FRONTEND_URL
        value: https://novessafoundation.org.ng
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_EMAIL
        value: admin@novessafoundation.org.ng
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        value: sqlite:///db.sqlite3
      # Email configuration - set these in Render dashboard
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      # Paystack configuration - set these in Render dashboard
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      # Mailgun configuration - set these in Render dashboard
      - key: MAILGUN_API_KEY
        sync: false
      - key: MAILGUN_DOMAIN
        sync: false
      - key: MAILGUN_WEBHOOK_SIGNING_KEY
        sync: false

services:
  - type: web
    name: novessa-api
    runtime: python
    rootDir: apps/api
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: novessa-api.onrender.com,api.novessa.org
      - key: CSRF_TRUSTED_ORIGINS
        value: https://novessa.org,https://www.novessa.org,https://api.novessa.org
      - key: CORS_ALLOWED_ORIGINS
        value: https://novessa.org,https://www.novessa.org
      - key: FRONTEND_URL
        value: https://novessa.org
databases:
  - name: novessa-postgres
    plan: free

